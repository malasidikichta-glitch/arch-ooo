<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arch</title>
<meta name="description" content="arch — music, plugins, live">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/_shared.css">
<style>
/* home: quiet, wide, centered */
main.home{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:0 2.5rem;display:flex;flex-direction:column;justify-content:space-between;min-height:calc(100vh - 52px)}

.hero{padding:10vh 0 8vh;text-align:center}
.hero-mark{font-size:10px;color:var(--dim);letter-spacing:0.3em;text-transform:lowercase;margin-bottom:30px}
.hero-title{font-family:'Instrument Serif',serif;font-size:clamp(96px,22vw,260px);line-height:0.85;font-weight:400;letter-spacing:-0.04em;color:var(--text);margin-bottom:28px}
.hero-sub{font-size:11px;color:var(--muted);letter-spacing:0.25em;text-transform:lowercase;line-height:1.9}
.hero-sub .dot{color:var(--dim);margin:0 10px}

.next{margin:0 auto 6vh;padding:24px 0 40px;width:100%;max-width:720px;display:grid;grid-template-columns:auto 1fr auto;gap:28px;align-items:center;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.next-label{font-size:9px;color:var(--dim);letter-spacing:0.3em;text-transform:lowercase;writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;padding:4px 0}
.next-main{font-family:'Instrument Serif',serif;font-size:clamp(22px,3vw,32px);font-weight:400;letter-spacing:-0.015em;line-height:1.2;text-transform:lowercase;margin-bottom:8px}
.next-meta{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:lowercase}
.next a.tickets{font-size:10px;color:var(--text);letter-spacing:0.2em;text-transform:lowercase;text-decoration:none;padding:12px 22px;border:1px solid var(--border-h);transition:background 0.2s,color 0.2s;white-space:nowrap}
.next a.tickets:hover{background:var(--text);color:var(--bg)}

@media(max-width:640px){
  main.home{padding:0 1.25rem}
  .hero{padding:6vh 0 4vh}
  .next{grid-template-columns:1fr;text-align:center;gap:16px;padding:28px 0}
  .next-label{writing-mode:horizontal-tb;transform:none;text-align:left}
}
</style>
</head>
<body>

<nav class="topnav">
  <a href="/" class="nav-logo">arch</a>
  <div class="nav-links">
    <a href="/releases">releases</a>
    <a href="/events">events</a>
    <a href="/shop">shop</a>
    <a href="/plugins">plugins</a>
    <a href="/contact">contact</a>
  </div>
</nav>

<main class="home">

  <div class="hero">
    <div class="hero-mark">— music · plugins · live</div>
    <h1 class="hero-title">arch</h1>
    <div class="hero-sub">clermont-ferrand<span class="dot">·</span>paris<span class="dot">·</span>partout</div>
  </div>

  <section class="next">
    <div class="next-label">— next</div>
    <div>
      <div class="next-main">arch club @ la coopérative de mai - clermont-ferrand</div>
      <div class="next-meta">sam 02.05.2026 · xo · duno · limak · mau_v</div>
    </div>
    <a class="tickets" href="https://shotgun.live/fr/events/arch-club-la-cooperative-de-mai" target="_blank" rel="noopener">tickets →</a>
  </section>

</main>

<footer class="site-footer">
  &copy; 2026 arch · <a href="mailto:contact@arch-inc.fr">contact@arch-inc.fr</a>
</footer>

<script src="/_track.js"></script>
<script src="/_gate.js"></script>
</body>
</html>
