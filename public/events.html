<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arch — events</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/_shared.css">
<style>
.event{display:grid;grid-template-columns:140px 1fr auto;gap:32px;align-items:center;padding:28px 0;border-bottom:1px solid var(--border)}
.event.past{opacity:0.45}
.event-date{font-family:'Instrument Serif',serif;font-size:32px;font-weight:400;letter-spacing:-0.01em;line-height:1}
.event-date .year{font-size:11px;color:var(--muted);display:block;margin-top:6px;font-family:'Geist Mono',monospace;letter-spacing:0.12em}
.event-body h3{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;letter-spacing:-0.01em;margin-bottom:6px;text-transform:lowercase}
.event-venue{font-size:10px;color:var(--muted);letter-spacing:0.12em;text-transform:lowercase}
.event-lineup{font-size:10px;color:var(--muted);letter-spacing:0.05em;margin-top:6px}
.event-lineup span{color:var(--text)}
.event-tickets{font-size:10px;letter-spacing:0.15em;text-transform:lowercase;padding:10px 18px;border:1px solid var(--border-h);color:var(--text);text-decoration:none;transition:background 0.2s,color 0.2s;white-space:nowrap}
.event-tickets:hover{background:var(--text);color:var(--bg)}
.event-status{font-size:9px;color:var(--dim);letter-spacing:0.2em;text-transform:lowercase}
.event-soldout{font-size:9px;letter-spacing:0.2em;text-transform:lowercase;padding:6px 10px;border:1px solid var(--border-h);color:var(--muted);white-space:nowrap}
.empty-note{font-size:11px;color:var(--dim);letter-spacing:0.04em;padding:2rem 0;text-align:center}
.loading{font-size:10px;color:var(--dim);letter-spacing:0.2em;text-transform:lowercase;padding:3rem 0;text-align:center}
.loading::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

@media(max-width:640px){.event{grid-template-columns:1fr;gap:12px}.event-date{font-size:24px}}
</style>
</head>
<body>

<nav class="topnav">
  <a href="/" class="nav-logo">arch</a>
  <div class="nav-links">
    <a href="/music">music</a>
    <a href="/events" class="active">events</a>
    <a href="/shop">shop</a>
    <a href="/plugins">plugins</a>
    <a href="/contact">contact</a>
  </div>
</nav>

<main>
  <div class="page-kicker">— 02</div>
  <h1 class="page-title">events</h1>

  <div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin:-20px 0 32px;flex-wrap:wrap">
    <div style="font-size:11px;color:var(--muted);letter-spacing:0.04em">arch club</div>
    <a href="https://shotgun.live/fr/venues/arch-inc" target="_blank" rel="noopener" style="font-size:10px;color:var(--text);letter-spacing:0.15em;text-transform:lowercase;text-decoration:none;padding:8px 14px;border:1px solid var(--border-h);transition:background 0.2s,color 0.2s" onmouseover="this.style.background='var(--text)';this.style.color='var(--bg)'" onmouseout="this.style.background='transparent';this.style.color='var(--text)'">voir sur shotgun →</a>
  </div>

  <div class="loading" id="loading">loading</div>

  <div class="section" id="sec-upcoming" style="display:none">
    <div class="section-label">— upcoming</div>
    <div id="events-upcoming"></div>
  </div>

  <div class="section" id="sec-past" style="display:none">
    <div class="section-label">— past</div>
    <div id="events-past"></div>
  </div>

</main>

<footer class="site-footer">
  &copy; 2026 arch · <a href="mailto:contact@arch-inc.fr">contact@arch-inc.fr</a>
</footer>

<script src="/_track.js"></script>
<script src="/_gate.js"></script>
<script>
function fmtDay(iso){
  if(!iso) return '—';
  var d=new Date(iso);
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');
}
function fmtYear(iso){ if(!iso) return '—'; return String(new Date(iso).getFullYear()); }
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);}

function renderEvent(e, past){
  var lineup = (e.lineup||[]).map(a=>'<span>'+escapeHtml(String(a).toLowerCase())+'</span>').join(' · ');
  var venue = (e.venue||'').toLowerCase().trim();
  var city  = (e.city||'').toLowerCase().trim();
  // Uniform format: "arch club @ {venue} - {city}"
  var title;
  if (venue && city)      title = 'arch club @ ' + venue + ' - ' + city;
  else if (venue)          title = 'arch club @ ' + venue;
  else if (city)           title = 'arch club - ' + city;
  else                     title = (e.title || '—').toLowerCase();
  return '<div class="event'+(past?' past':'')+'">'+
    '<div class="event-date">'+fmtDay(e.date)+'<span class="year">'+fmtYear(e.date)+'</span></div>'+
    '<div class="event-body">'+
      '<h3>'+escapeHtml(title)+'</h3>'+
      (lineup?'<div class="event-lineup">'+lineup+'</div>':'')+
    '</div>'+
    (past
      ? '<div class="event-soldout">sold out</div>'
      : (e.ticket_url
          ? '<a class="event-tickets" href="'+escapeHtml(e.ticket_url)+'" target="_blank" rel="noopener">tickets →</a>'
          : '<div class="event-status">date à venir</div>'))+
  '</div>';
}

(async function(){
  try {
    var res = await fetch('/api/v2/events');
    var data = await res.json();
    var events = data.events || [];
    var now = Date.now();
    var upcoming = events.filter(e => !e.date || new Date(e.date).getTime() >= now - 86400000);
    var past = events.filter(e => e.date && new Date(e.date).getTime() < now - 86400000);
    upcoming.sort((a,b) => (a.date||'').localeCompare(b.date||''));
    past.sort((a,b) => (b.date||'').localeCompare(a.date||''));

    if(upcoming.length){
      document.getElementById('events-upcoming').innerHTML = upcoming.map(e=>renderEvent(e,false)).join('');
      document.getElementById('sec-upcoming').style.display = 'block';
    }else{
      document.getElementById('events-upcoming').innerHTML = '<div class="empty-note">aucune date annoncée pour le moment</div>';
      document.getElementById('sec-upcoming').style.display = 'block';
    }

    if(past.length){
      document.getElementById('events-past').innerHTML = past.map(e=>renderEvent(e,true)).join('');
      document.getElementById('sec-past').style.display = 'block';
    }

    document.getElementById('loading').style.display = 'none';
  } catch(err) {
    document.getElementById('loading').textContent = 'erreur de chargement';
  }
})();
</script>
</body>
</html>
