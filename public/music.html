<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arch — music</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/_shared.css">
<style>
.releases-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:2rem}

.release{display:flex;flex-direction:column;gap:14px}
.release-embed{border:1px solid var(--border);background:var(--surface);overflow:hidden;border-radius:8px}
.release-embed iframe{display:block;width:100%;border:0;background:transparent}
.release-empty{aspect-ratio:1;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:10px;letter-spacing:0.2em;text-transform:lowercase;padding:2rem;text-align:center}

.pills{display:flex;gap:8px;flex-wrap:wrap}
.pills a{font-size:9px;color:var(--muted);letter-spacing:0.15em;text-transform:lowercase;text-decoration:none;padding:6px 12px;border:1px solid var(--border);transition:border-color 0.2s,color 0.2s}
.pills a:hover{border-color:var(--border-h);color:var(--text)}

.artists-section{margin-top:5rem}
.artists-label{font-size:10px;color:var(--dim);letter-spacing:0.2em;text-transform:lowercase;padding-bottom:12px;margin-bottom:24px;border-bottom:1px solid var(--border)}
.artists-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.artist-card{background:var(--surface);border:1px solid var(--border);padding:20px 22px;display:flex;flex-direction:column;gap:12px}
.artist-name{font-family:'Instrument Serif',serif;font-size:26px;font-weight:400;letter-spacing:-0.01em;text-transform:lowercase}

.loading{padding:4rem 0;text-align:center;color:var(--dim);font-size:10px;letter-spacing:0.25em;text-transform:lowercase}
.loading::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

@media(max-width:700px){
  .releases-grid{grid-template-columns:1fr;gap:24px}
  .artists-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="topnav">
  <a href="/" class="nav-logo">arch</a>
  <div class="nav-links">
    <a href="/music" class="active">music</a>
    <a href="/events">events</a>
    <a href="/shop">shop</a>
    <a href="/plugins">plugins</a>
    <a href="/contact">contact</a>
  </div>
</nav>

<main>
  <div class="page-kicker">— 01</div>
  <h1 class="page-title">dernières sorties</h1>

  <div class="loading" id="loading">loading</div>
  <div class="releases-grid" id="grid" style="display:none"></div>

  <section class="artists-section" id="artists-section" style="display:none">
    <div class="artists-label">— artistes</div>
    <div class="artists-grid" id="artists-grid"></div>
  </section>

</main>

<footer class="site-footer">
  &copy; 2026 arch · <a href="mailto:contact@arch-inc.fr">contact@arch-inc.fr</a>
</footer>

<script src="/_track.js"></script>
<script src="/_gate.js"></script>
<script>
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);}

function socialsPills(data){
  var r = data.release;
  var spotifyUrl = r?.url || (data.artist_id ? 'https://open.spotify.com/artist/'+data.artist_id : '');
  var s = data.socials || {};
  var items = [];
  if(spotifyUrl)    items.push('<a href="'+escapeHtml(spotifyUrl)+'" target="_blank" rel="noopener">spotify</a>');
  if(s.instagram)   items.push('<a href="https://instagram.com/'+encodeURIComponent(s.instagram.replace(/^@/,''))+'" target="_blank" rel="noopener">instagram</a>');
  if(s.tiktok)      items.push('<a href="https://tiktok.com/@'+encodeURIComponent(s.tiktok.replace(/^@/,''))+'" target="_blank" rel="noopener">tiktok</a>');
  if(s.soundcloud)  items.push('<a href="https://soundcloud.com/'+encodeURIComponent(s.soundcloud)+'" target="_blank" rel="noopener">soundcloud</a>');
  if(s.shotgun)     items.push('<a href="https://shotgun.live/fr/artists/'+encodeURIComponent(s.shotgun)+'" target="_blank" rel="noopener">shotgun</a>');
  if(s.youtube)     items.push('<a href="https://youtube.com/@'+encodeURIComponent(s.youtube.replace(/^@/,''))+'" target="_blank" rel="noopener">youtube</a>');
  if(!items.length) return '';
  return '<div class="pills">'+items.join('')+'</div>';
}

function renderRelease(key, data){
  var r = data.release;
  if(!r || !r.id){
    return '<div class="release">'+
      '<div class="release-empty">pas encore de release</div>'+
      socialsPills(data)+
    '</div>';
  }
  return '<div class="release">'+
    '<div class="release-embed">'+
      '<iframe '+
        'src="'+escapeHtml(r.embed_url)+'" '+
        'height="380" frameborder="0" allowfullscreen="" '+
        'allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" '+
        'loading="lazy"></iframe>'+
    '</div>'+
    socialsPills(data)+
  '</div>';
}

function renderArtistCard(key, data){
  return '<div class="artist-card">'+
    '<div class="artist-name">'+escapeHtml(data.artist||key)+'</div>'+
    socialsPills(data)+
  '</div>';
}

(async function(){
  try {
    var res = await fetch('/api/v2/releases');
    var data = await res.json();

    // Top — releases (artists with has_release=true)
    var grid = document.getElementById('grid');
    var releaseArtists = Object.entries(data).filter(([k,v]) => v.has_release);
    grid.innerHTML = releaseArtists.map(([k,v]) => renderRelease(k,v)).join('');
    grid.style.display = 'grid';

    // Bottom — all 4 artists with socials
    var aGrid = document.getElementById('artists-grid');
    var order = ['xo','duno','mau_v','limak'];
    aGrid.innerHTML = order.filter(k => data[k]).map(k => renderArtistCard(k, data[k])).join('');
    document.getElementById('artists-section').style.display = 'block';

    document.getElementById('loading').style.display = 'none';
  } catch(err){
    document.getElementById('loading').textContent = 'erreur chargement';
  }
})();
</script>
</body>
</html>
